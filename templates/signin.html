<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AssistFlow AI — Create Account</title>
    <meta name="description" content="Get started with AssistFlow AI. Create a free account and begin automating your customer support with AI in minutes.">
    <link rel="canonical" href="https://assistflow.ai/signin">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/signin.css">
</head>
<body>
<div class="auth-wrapper">
    <main class="card" role="main">

        <!-- Brand -->
        <a href="/" class="brand" aria-label="AssistFlow AI home">
            <div class="brand-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" aria-hidden="true">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
            </div>
            <span class="brand-name">AssistFlow AI</span>
        </a>

        <h1 class="card-heading">Create your account</h1>
        <p class="card-subheading">Get up and running with AI-powered support in minutes.</p>

        <form id="signupForm" novalidate>

            <!-- Full Name -->
            <div class="field">
                <label for="name">Full name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Jane Smith"
                    required
                    autocomplete="name"
                    aria-required="true"
                >
            </div>

            <!-- Allowed Base URL -->
            <div class="field">
                <label for="url">
                    Website URL
                    <span style="font-weight:400;color:var(--text-muted);font-size:11px;margin-left:4px;">(required for security)</span>
                </label>
                <input
                    type="url"
                    id="url"
                    name="url"
                    placeholder="https://yourwebsite.com"
                    required
                    autocomplete="url"
                    inputmode="url"
                    aria-required="true"
                    aria-describedby="url-hint"
                >
                <p class="field-hint" id="url-hint">
                    🔒 Enter your website's domain. The AI widget will only work on this domain, keeping your account secure.
                </p>
            </div>

            <!-- Email -->
            <div class="field">
                <label for="email">Email address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                    inputmode="email"
                    aria-required="true"
                >
            </div>

            <!-- Password + Strength -->
            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Create a strong password"
                        required
                        autocomplete="new-password"
                        aria-required="true"
                        aria-describedby="strength-label"
                    >
                    <button
                        type="button"
                        class="pw-toggle"
                        id="pwToggle"
                        aria-label="Show password"
                        aria-pressed="false"
                        tabindex="0"
                    >
                        <svg id="eyeShow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="eyeHide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>

                <!-- Password Strength Meter -->
                <div class="strength-meter" id="strengthMeter" aria-live="polite">
                    <div class="strength-bars" aria-hidden="true">
                        <div class="strength-bar" id="bar1"></div>
                        <div class="strength-bar" id="bar2"></div>
                        <div class="strength-bar" id="bar3"></div>
                        <div class="strength-bar" id="bar4"></div>
                    </div>
                    <span class="strength-label" id="strength-label"></span>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                Create Account
            </button>
        </form>

        <p id="message" role="alert" aria-live="assertive"></p>

        <div class="divider" role="separator"></div>
        <footer class="bottom-text">
            Already have an account? <a href="/login">Sign in</a>
        </footer>

    </main>
</div>

<script>
/* ─── Password Toggle ─── */
const pwField  = document.getElementById('password');
const pwToggle = document.getElementById('pwToggle');
const eyeShow  = document.getElementById('eyeShow');
const eyeHide  = document.getElementById('eyeHide');

pwToggle.addEventListener('click', () => {
    const isHidden = pwField.type === 'password';
    pwField.type = isHidden ? 'text' : 'password';
    eyeShow.style.display = isHidden ? 'none' : 'inline';
    eyeHide.style.display = isHidden ? 'inline' : 'none';
    pwToggle.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    pwToggle.setAttribute('aria-pressed', String(isHidden));
});

/* ─── Password Strength Meter ─── */
const strengthMeter = document.getElementById('strengthMeter');
const bars          = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
const strengthLabel = document.getElementById('strength-label');

const levels = [
    { label: 'Too short',  cls: 'filled-weak',   score: 0 },
    { label: 'Weak',       cls: 'filled-weak',   score: 1 },
    { label: 'Fair',       cls: 'filled-fair',   score: 2 },
    { label: 'Good',       cls: 'filled-good',   score: 3 },
    { label: 'Strong',     cls: 'filled-strong', score: 4 },
];

function getStrengthScore(pw) {
    if (pw.length < 6) return 0;
    let score = 1;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw)) score++;
    return Math.min(score, 4);
}

pwField.addEventListener('input', () => {
    const val   = pwField.value;
    const score = getStrengthScore(val);

    if (!val) {
        strengthMeter.classList.remove('visible');
        return;
    }

    strengthMeter.classList.add('visible');
    const level = levels[score];

    bars.forEach((bar, i) => {
        bar.className = 'strength-bar';
        if (i < score) bar.classList.add(level.cls);
    });

    strengthLabel.textContent = level.label;
    strengthLabel.style.color = score <= 1 ? 'var(--error)' : score === 2 ? 'var(--accent-secondary)' : score === 3 ? 'var(--accent-color)' : 'var(--success)';
});

/* ─── Form Submission ─── */
const signupForm = document.getElementById('signupForm');
const submitBtn  = document.getElementById('submitBtn');
const messageEl  = document.getElementById('message');

function setLoading(loading) {
    submitBtn.disabled = loading;
    submitBtn.innerHTML = loading
        ? '<span class="spinner" aria-hidden="true"></span>Creating account…'
        : 'Create Account';
}

// Inline spinner CSS (inject once)
const spinnerCSS = document.createElement('style');
spinnerCSS.textContent = `.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}@keyframes spin{to{transform:rotate(360deg)}}`;
document.head.appendChild(spinnerCSS);

function showMessage(text, type) {
    messageEl.textContent = text;
    messageEl.className = `visible ${type}`;
}

signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    messageEl.className = '';

    // Basic client-side validation
    const password = pwField.value;
    if (password.length < 6) {
        showMessage('Password must be at least 6 characters.', 'error');
        pwField.focus();
        return;
    }

    setLoading(true);

    const formData = new FormData(signupForm);

    try {
        const response = await fetch('/signin', { method: 'POST', body: formData });
        const data = await response.json();

        if (data.success) {
            localStorage.setItem('token', data.token);
            showMessage('Account created! Taking you to your dashboard…', 'success');
            setTimeout(() => window.location.href = '/dashboard', 700);
        } else {
            const msg = data.message || 'Something went wrong. Please check your details and try again.';
            showMessage(msg, 'error');
            setLoading(false);
        }
    } catch {
        showMessage('Connection problem. Check your internet and try again.', 'error');
        setLoading(false);
    }
});
</script>
</body>
</html>
