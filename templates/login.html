<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AssistFlow AI — Login</title>
    <meta name="description" content="Sign in to your AssistFlow AI account to manage your AI-powered knowledge base and customer support workflows.">
    <link rel="canonical" href="https://assistflow.ai/login">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://assistflow.ai/login">
    <meta property="og:title" content="AssistFlow AI — Login">
    <meta property="og:description" content="Sign in to your AssistFlow AI account.">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="AssistFlow AI — Login">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/login.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "AssistFlow AI Login",
      "description": "Sign in page for the AssistFlow AI platform."
    }
    </script>
</head>
<body>

<!-- Toast Container -->
<div id="toast-container" role="status" aria-live="polite" aria-atomic="true"></div>

<div class="auth-wrapper">
    <main class="card" role="main">

        <!-- Brand -->
        <a href="/" class="brand" aria-label="AssistFlow AI home">
            <div class="brand-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" aria-hidden="true">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
            </div>
            <span class="brand-name">AssistFlow AI</span>
        </a>

        <h1 class="card-heading">Welcome back</h1>
        <p class="card-subheading">Sign in to your account to continue</p>

        <form id="loginForm" novalidate>
            <!-- Email -->
            <div class="field">
                <label for="email">Email address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                    inputmode="email"
                    aria-required="true"
                >
            </div>

            <!-- Password -->
            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                        aria-required="true"
                    >
                    <button
                        type="button"
                        class="pw-toggle"
                        id="pwToggle"
                        aria-label="Show password"
                        aria-pressed="false"
                        tabindex="0"
                    >
                        <!-- Eye icon (show) -->
                        <svg id="eyeShow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <!-- Eye-off icon (hide) – hidden by default -->
                        <svg id="eyeHide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                Sign In
            </button>
        </form>

        <!-- Inline feedback (kept for no-JS fallback; toast handles JS-on) -->
        <p id="message" role="alert" aria-live="assertive"></p>

        <div class="divider" role="separator"></div>
        <footer class="bottom-text">
            Don't have an account? <a href="/signin">Create one</a>
        </footer>

    </main>
</div>

<script>
/* ─── Toast System ─── */
function showToast(message, type = 'info', duration = 4000) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span class="toast-dot" aria-hidden="true"></span><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.classList.add('out');
        toast.addEventListener('animationend', () => toast.remove());
    }, duration);
}

/* ─── Password Toggle ─── */
const pwField  = document.getElementById('password');
const pwToggle = document.getElementById('pwToggle');
const eyeShow  = document.getElementById('eyeShow');
const eyeHide  = document.getElementById('eyeHide');

pwToggle.addEventListener('click', () => {
    const isHidden = pwField.type === 'password';
    pwField.type = isHidden ? 'text' : 'password';
    eyeShow.style.display = isHidden ? 'none' : 'inline';
    eyeHide.style.display = isHidden ? 'inline' : 'none';
    pwToggle.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    pwToggle.setAttribute('aria-pressed', String(isHidden));
});

/* ─── Form Submission ─── */
const loginForm = document.getElementById('loginForm');
const submitBtn = document.getElementById('submitBtn');
const messageEl = document.getElementById('message');

function setLoading(loading) {
    submitBtn.disabled = loading;
    submitBtn.innerHTML = loading
        ? '<span class="spinner" aria-hidden="true"></span>Signing in…'
        : 'Sign In';
}

function showInlineMessage(text, type) {
    messageEl.textContent = text;
    messageEl.className = `visible ${type}`;
}

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Clear previous state
    messageEl.className = '';

    setLoading(true);

    const formData = new FormData(loginForm);

    try {
        const response = await fetch('/login', { method: 'POST', body: formData });
        const data = await response.json();

        if (data.success) {
            localStorage.setItem('token', data.token);
            showToast('Signed in successfully! Redirecting…', 'success');
            setTimeout(() => window.location.href = '/dashboard', 700);
        } else {
            // Friendly error messages
            const msg = data.message || 'Incorrect email or password. Please try again.';
            showInlineMessage(msg, 'error');
            showToast(msg, 'error');
            setLoading(false);
        }
    } catch {
        const msg = 'Connection problem. Check your internet and try again.';
        showInlineMessage(msg, 'error');
        showToast(msg, 'error');
        setLoading(false);
    }
});
</script>
</body>
</html>
