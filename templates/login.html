<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Smart AI — Login</title>
    <meta name="description" content="Sign in to your Smart AI account to manage your personal AI knowledge base, save insights, and continue your workflow.">
    <link rel="canonical" href="https://smart-ai-example.com/login">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://smart-ai-example.com/login">
    <meta property="og:title" content="Smart AI — Login">
    <meta property="og:description" content="Sign in to your Smart AI account to manage your personal AI knowledge base.">
    
    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="https://smart-ai-example.com/login">
    <meta name="twitter:title" content="Smart AI — Login">
    <meta name="twitter:description" content="Sign in to your Smart AI account to manage your personal AI knowledge base.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/login.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Smart AI Login",
      "description": "Sign in page for the Smart AI knowledge base platform."
    }
    </script>
</head>
<body>
<div class="auth-wrapper">
    <main class="card">
        <header class="brand">
            <div class="brand-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
            </div>
            <span class="brand-name">Smart AI</span>
        </header>

        <h1 class="card-heading">Welcome back</h1>
        <p class="card-subheading">Sign in to your account to continue</p>

        <form id="loginForm">
            <div class="field">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <p id="message" aria-live="polite"></p>

        <div class="divider"></div>
        <footer class="bottom-text">
            Don't have an account? <a href="/signin">Create one</a>
        </footer>
    </main>
</div>
<script>
    const loginForm = document.getElementById("loginForm");
const messageEl = document.getElementById("message");

loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const btn = loginForm.querySelector("button[type='submit']");
    btn.disabled = true;
    btn.textContent = "Signing in...";

    messageEl.className = "";
    messageEl.style.display = "none";

    const formData = new FormData(loginForm);

    try {
        const response = await fetch("/login", { method: "POST", body: formData });
        const data = await response.json();

        messageEl.style.display = "block";
        messageEl.textContent = data.message;

        if (data.success) {
            messageEl.style.background = "rgba(34, 197, 94, 0.1)";
            messageEl.style.color = "#22C55E";
            messageEl.style.border = "1px solid rgba(34, 197, 94, 0.2)";
            localStorage.setItem("token", data.token);
            setTimeout(() => window.location.href = "/dashboard", 600);
        } else {
            messageEl.style.background = "rgba(239, 68, 68, 0.1)";
            messageEl.style.color = "#EF4444";
            messageEl.style.border = "1px solid rgba(239, 68, 68, 0.2)";
            btn.disabled = false;
            btn.textContent = "Sign In";
        }
    } catch {
        messageEl.style.display = "block";
        messageEl.textContent = "Connection error. Please try again.";
        messageEl.style.background = "rgba(239, 68, 68, 0.1)";
        messageEl.style.color = "#EF4444";
        messageEl.style.border = "1px solid rgba(239, 68, 68, 0.2)";
        btn.disabled = false;
        btn.textContent = "Sign In";
    }
});
</script>
</body>
</html>
